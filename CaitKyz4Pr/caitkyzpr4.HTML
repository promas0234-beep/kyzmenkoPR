<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Макет</title>
    <style>
        /* Базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            min-height: 200vh;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР (Занимает весь экран + скролл) */
        .main-container {
            width: 100%;
            /* Высота 200% от экрана вызывает появление скролла */
            min-height: 300vh; 
            background-color: #ffb380; /* Цвет оранжевых линий */
            display: flex;
            flex-direction: column;
            
            padding: 10px;   /* Внешняя оранжевая рамка */
            gap: 10px;       /* Расстояние между блоками (внутренние линии) */
            
            /* Серая внешняя рамка как на макете */
            border: 3px solid #d3d3d3; 
        }

        /* ВЕРХ (Header) */
        header {
            background-color: #ffffff;
            /* Блок занимает 15% высоты */
            flex: 0 0 20%;
            /* Минимальная высота, чтобы блок точно был виден */
            min-height: 100px; 
        }

        /* СЕРЕДИНА (Обертка для колонок) */
        .middle-section {
            flex: 1; /* Занимает всё оставшееся место */
            display: flex;
            flex-direction: row;
            gap: 5px; /* Оранжевые линии между колонками */
        }

        /* Боковые колонки (Левая и Правая) */
        .col-side {
            background-color: #ffffff;
            flex: 1; /* Ширина колонок одинаковая */
        }

        /* Центральная колонка (Разделена на два блока) */
        .col-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px; /* Оранжевая линия посередине */
        }

        /* Два блока внутри центральной колонки */
        .col-center div {
            background-color: #ffffff;
            flex: 1; /* Делят высоту центральной колонки поровну */
        }

        /* ПОДВАЛ (Footer) */
        footer {
            background-color: #ffffff;
            /* Блок занимает 20% высоты */
            flex: 0 0 50%;
            /* Минимальная высота */
            min-height: 120px;
        }
    </style>
</head>
<body>

    <!-- Единый контейнер на всю страницу -->
    <div class="main-container">

        <!-- ВЕРХ (Header) -->
        <header></header>

        <!-- СЕРЕДИНА -->
        <div class="middle-section">
            <div class="col-side"></div>
            
            <div class="col-center">
                <div></div>
                <div></div>
            </div>
            
            <div class="col-side"></div>
        </div>

        <!-- ПОДВАЛ (Footer) -->
        <footer class="footer"></footer>

    </div>

</body>
</html>
