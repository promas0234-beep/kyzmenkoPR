<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>бб</title>
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 220vh; 
        }

        .layout {
            width: 100%;
            height: 100%;
            display: grid;
            
            grid-template-rows: 500px 250px 1fr 450px;
            
            grid-template-columns: 23% 1fr 23%;
        }

        .header {
            grid-column: 1 / -1;
            background-color: #333; 
        }

        .menu {
            grid-column: 1 / -1;
            background-color: #e5e5e5;
        }

        .left-sidebar {
            grid-column: 1;
            grid-row: 3;
            background-color: #777;
        }


        .content {
            grid-column: 2;
            grid-row: 3;
            background-color: #fff;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        .right-sidebar {
            grid-column: 3;
            grid-row: 3;
            background-color: #777;
        }

        .footer {
            grid-column: 1 / -1;
            background-color: #999;
        }

    </style>
</head>
<body>

    <div class="layout">

        <div class="header"></div>
        
        <div class="menu"></div>
        
        <div class="left-sidebar"></div>
        
        <div class="content"></div>
        
        <div class="right-sidebar"></div>
        
        <div class="footer"></div>
    </div>

</body>
</html>
