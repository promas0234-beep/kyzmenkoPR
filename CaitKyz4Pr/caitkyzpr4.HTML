<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Layout</title>
<style>
  /* Базовый сброс */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #ffccaa; /* Цвет линий-разделителей */
    padding: 4px;             /* Внешняя рамка */
  }

  /* Главный вертикальный контейнер */
  .container {
    display: flex;
    flex-direction: column;
    min-height: 100vh;        /* Растягивается на весь экран, но позволяет расти вниз → появляется скролл */
    gap: 4px;                 /* Толщина внутренних разделителей */
  }

  /* Шапка */
  .header {
    background-color: #fff;
    height: 120px;            /* Фиксированная высота */
    position: relative;
  }

  /* Цифра 13 в шапке */
  .header::before {
    content: "13";
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 1.5rem;
    font-weight: 700;
    color: #333;
  }

  /* Средняя часть (горизонтальный flex) */
  .middle {
    display: flex;
    flex-direction: row;
    gap: 4px;
    flex: 1;                  /* Занимает свободное место, но растёт при переполнении → скролл */
  }

  /* Левая и правая колонки */
  .left, .right {
    background-color: #fff;
    flex: 1.2;                /* Пропорции ширины */
  }

  /* Центральная колонка (вертикальный flex) */
  .center {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 0.8;
  }

  .center-top, .center-bottom {
    background-color: #fff;
    flex: 1;                  /* Делят центр строго пополам */
  }

  /* Подвал */
  .footer {
    background-color: #fff;
    height: 120px;            /* Фиксированная высота */
  }

  /* Заглушки текста для наглядности */
  .left::after, .right::after, 
  .center-top::after, .center-bottom::after {
    content: "Блок";
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 1.2rem;
    color: #999;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header"></div>
  
  <div class="middle">
    <div class="left"></div>
    
    <div class="center">
      <div class="center-top"></div>
      <div class="center-bottom"></div>
    </div>
    
    <div class="right"></div>
  </div>
  
  <div class="footer"></div>
</div>

</body>
</html>
