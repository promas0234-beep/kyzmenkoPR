<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Layout</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    padding: 4px;
    background-color: #ffccaa; /* Цвет разделителей */
  }

  /* Главный контейнер - вертикальный flex */
  .container {
    display: flex;
    flex-direction: column;
    height: 220vh;
    gap: 4px;
  }

  /* Верхний блок */
  .header {
    background-color: #fff;
    flex: 0 0 120px; /* Фиксированная высота */
    position: relative;
  }

  /* Номер 13 */
  .header::before {
    content: "13";
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 1.5rem;
    font-weight: 700;
    color: #333;
  }

  /* Средняя часть - горизонтальный flex */
  .middle {
    display: flex;
    flex-direction: row;
    gap: 4px;
    flex: 1; /* Занимает всё доступное пространство */
  }

  /* Левая колонка */
  .left {
    background-color: #fff;
    flex: 1.2; /* Ширина пропорциональна */
  }

  /* Центральная колонка - вертикальный flex */
  .center {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 0.8;
  }

  .center-top, .center-bottom {
    background-color: #fff;
    flex: 1; /* Делят высоту пополам */
  }

  /* Правая колонка */
  .right {
    background-color: #fff;
    flex: 1.2;
  }

  /* Нижний блок */
  .footer {
    background-color: #fff;
    flex: 0 0 120px;
  }

  /* Опционально: текст для демонстрации */
  .left::after {
    content: "Левый блок";
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 1.2rem;
    color: #999;
  }

  .right::after {
    content: "Правый блок";
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 1.2rem;
    color: #999;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header"></div>
  
  <div class="middle">
    <div class="left"></div>
    
    <div class="center">
      <div class="center-top"></div>
      <div class="center-bottom"></div>
    </div>
    
    <div class="right"></div>
  </div>
  
  <div class="footer"></div>
</div>

</body>
</html>
