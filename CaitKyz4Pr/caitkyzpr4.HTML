<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 800px;
            background-color: #fca;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-block {
            flex: 0 0 15%;
            background-color: white;
        }

        .middle-section {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .left-block {
            flex: 1;
            background-color: white;
        }

        .center-blocks {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .center-top {
            flex: 1;
            background-color: white;
        }

        .center-bottom {
            flex: 1;
            background-color: white;
        }

        .right-block {
            flex: 1;
            background-color: white;
        }

        .bottom-block {
            flex: 0 0 15%;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-block"></div>
        
        <div class="middle-section">
            <div class="left-block"></div>
            
            <div class="center-blocks">
                <div class="center-top"></div>
                <div class="center-bottom"></div>
            </div>
            
            <div class="right-block"></div>
        </div>
        
        <div class="bottom-block"></div>
    </div>
</body>
</html>
